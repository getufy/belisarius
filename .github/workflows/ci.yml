name: ci

# Mirrors `just ci` exactly. Keep this file in sync with the justfile so the
# local feedback loop and the remote gate produce the same verdict.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: cargo + web + gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: install node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: web deps
        run: cd web && pnpm install --frozen-lockfile

      - name: install just
        uses: extractions/setup-just@v2

      # Split `just ci` into discrete steps so a failure names the offender.
      # Keep these in sync with the recipe — every step here mirrors a line in
      # the `ci` target in /justfile.
      - name: fmt-check
        run: just fmt-check

      - name: clippy
        run: just clippy

      - name: test
        run: just test

      - name: build
        run: just build

      # Architectural rules self-check using the binary we just built.
      - name: gate
        run: just gate

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    # rustsec/audit-check posts a check-run with the advisory report. The
    # default GITHUB_TOKEN is read-only on new repos; grant the writes the
    # action needs.
    permissions:
      contents: read
      checks: write
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
